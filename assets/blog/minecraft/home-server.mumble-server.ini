; Mumble server (mumble-server.ini) — home voice server
; Exposed through frp on the VPS (port 64738, TCP+UDP).
; Full reference: https://wiki.mumble.info/wiki/Murmur.ini

; Port: TCP — login/control, UDP — voice
port=64738

; Server password (empty = no password)
serverpassword=

; Welcome message shown on connect (HTML allowed)
welcometext="<br>Добро пожаловать на <b>Crimson</b> Mumble!<br>"

; Max slots
users=100

; Server name in the channel list
registername=Crimson

; Database and log (default paths of the mumble-server package)
database=/var/lib/mumble-server/mumble-server.sqlite
logfile=/var/log/mumble-server/mumble-server.log

; SuperUser (admin) is set NOT here, but via:
;   mumble-server -supw YOUR_ADMIN_PASSWORD
