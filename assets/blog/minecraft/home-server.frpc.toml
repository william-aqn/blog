serverAddr = "***"
serverPort = 7000
loginFailExit = false
auth.method = "token"
auth.token = "***"

[[proxies]]
name = "minecraft"
type = "tcp"
localIP = "127.0.0.1"
localPort = 25565
remotePort = 25565

[[proxies]]
name = "status"
type = "tcp"
localIP = "127.0.0.1"
localPort = 8080
remotePort = 80

# TeamSpeak 3 (if the service runs on another host, set its LAN IP in localIP)
[[proxies]]
name = "teamspeak-voice"
type = "udp"                 # voice — UDP
localIP = "127.0.0.1"
localPort = 9987
remotePort = 9987

[[proxies]]
name = "teamspeak-files"
type = "tcp"                 # file transfer (avatars, icons)
localIP = "127.0.0.1"
localPort = 30033
remotePort = 30033

# Mumble — port 64738 (TCP — control, UDP — voice); on another host, set its LAN IP
[[proxies]]
name = "mumble-tcp"
type = "tcp"
localIP = "127.0.0.1"
localPort = 64738
remotePort = 64738

[[proxies]]
name = "mumble-udp"
type = "udp"
localIP = "127.0.0.1"
localPort = 64738
remotePort = 64738

# BlueMap — world web map, port 8100 end-to-end
[[proxies]]
name = "bluemap"
type = "tcp"
localIP = "127.0.0.1"
localPort = 8100
remotePort = 8100