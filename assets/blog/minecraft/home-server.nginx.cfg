# /etc/nginx/conf.d/crafty-status.conf
#
# Home-side gateway exposed via frp (127.0.0.1:8080 -> VPS:8090). Routes:
#   /          -> redirect to the public landing page
#   /status    -> Crafty server status as JSON (cached)
#
# NOTE: this REPLACES the previous crafty-status.conf. Do not keep both files,
# or you'll get a duplicate "listen 127.0.0.1:8080" / cache-zone conflict.

# --- cache (http context) ---
proxy_cache_path /var/cache/nginx/crafty levels=1:2 keys_zone=crafty_cache:1m max_size=10m inactive=60s;

server {
    listen 127.0.0.1:8080;
    server_name _;

    # Root -> send visitors to the public site (use 301 if you want it permanent)
    location = / {
        return 302 https://you-real-server-domain.ltd;
    }

    # Server status (JSON), proxied from Crafty with a short cache
    location = /status {
        proxy_pass https://127.0.0.1:8443/api/v2/servers/status;

        proxy_ssl_verify off;                 # Crafty self-signed cert
        proxy_set_header Host 127.0.0.1:8443;

        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;

        proxy_cache crafty_cache;
        proxy_cache_valid 200 10s;
        proxy_cache_lock on;
        proxy_cache_background_update on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status always;

        # Crafty already sends its own CORS headers. Hide them and set a single one,
        # otherwise the response has a duplicate Access-Control-Allow-Origin (browsers reject it).
        # Narrow '*' to 'https://you-real-server-domain.ltd' in production.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        add_header Access-Control-Allow-Origin '*' always;
    }

    # Everything else
    location / {
        return 404;
    }
}
